<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Dời lịch hẹn - HealthSync</title>
</head>
<body>
<main layout:fragment="content" class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h4 class="fw-bold mb-0">Dời lịch hẹn</h4>
                </div>
                <div class="card-body">
                    <!-- Current Appointment Info -->
                    <div class="bg-light rounded-3 p-3 mb-4">
                        <h6 class="fw-bold text-muted mb-2">Lịch hẹn hiện tại</h6>
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <small class="text-muted">Bác sĩ</small>
                                <div class="fw-bold" th:text="${appointment.doctor.title + ' ' + appointment.doctor.user.fullName}">BS. Name</div>
                            </div>
                            <div class="col-md-6 mb-2">
                                <small class="text-muted">Chuyên khoa</small>
                                <div class="fw-bold" th:text="${appointment.doctor.specialty.name}">Specialty</div>
                            </div>
                            <div class="col-md-6 mb-2">
                                <small class="text-muted">Thời gian hiện tại</small>
                                <div class="fw-bold text-danger" th:text="${#temporals.format(appointment.appointmentTime, 'dd/MM/yyyy HH:mm')}">Time</div>
                            </div>
                            <div class="col-md-6 mb-2">
                                <small class="text-muted">Lý do</small>
                                <div class="fw-bold" th:text="${appointment.reason}">Reason</div>
                            </div>
                        </div>
                    </div>

                    <hr/>

                    <!-- Reschedule Form -->
                    <form th:action="@{/appointments/{id}/reschedule(id=${appointment.id})}"
                          th:object="${rescheduleRequest}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Chọn lịch làm việc mới</label>
                            <select th:field="*{newScheduleId}" class="form-select" required>
                                <option value="">-- Chọn ngày --</option>
                                <option th:each="schedule : ${schedules}"
                                        th:value="${schedule.id}"
                                        th:text="${#temporals.format(schedule.workDate, 'dd/MM/yyyy') + ' (' + #temporals.format(schedule.startTime, 'HH:mm') + ' - ' + #temporals.format(schedule.endTime, 'HH:mm') + ')'}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Thời gian khám mới</label>
                            <input type="datetime-local" th:field="*{newAppointmentTime}" class="form-control" required>
                        </div>

                        <div class="d-flex gap-2">
                            <a href="/appointments" class="btn btn-secondary">Quay lại</a>
                            <button type="submit" class="btn btn-primary">Xác nhận dời lịch</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
