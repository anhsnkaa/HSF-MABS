<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>MABS - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body>
<main layout:fragment="content" class="container-xxl my-5">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm mb-4 rounded-4" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm mb-4 rounded-4" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <section class="rounded-4 p-4 p-md-5 mb-5 bg-body-tertiary border">
        <div class="row">
            <div class="col-9">
                <p class="text-secondary mb-5 fs-5">
                    Tìm kiếm bác sĩ chuyên khoa và đặt lịch khám.
                </p>
                <form th:action="@{/patient/doctors}" method="get" class="bg-body border rounded-4 p-3 mb-4 shadow-sm">
                    <div class="mb-2">
                        <input name="keyword" class="form-control" placeholder="Tìm tên bác sĩ, chuyên khoa..." type="text"/>
                    </div>
                    <div class="d-flex gap-2">
                        <select name="specialtyId" class="form-select w-auto flex-grow-1">
                            <option value="">Tất cả khoa</option>
                            <option th:each="s : ${specialties}" th:value="${s.id}" th:text="${s.name}"></option>
                        </select>
                        <button type="submit" class="btn btn-primary px-4 fw-semibold text-nowrap">Tìm kiếm</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    
    <section class="mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold fs-4 m-0">Chuyên khoa</h2>
            <a class="fw-semibold small d-flex align-items-center gap-1 text-decoration-none" href="/patient/doctors">
                Xem tất cả <span class="material-symbols-outlined fs-6">arrow_forward</span>
            </a>
        </div>
        <div class="row g-3">
            <div class="col-md-4 col-lg-3" th:each="specialty : ${specialties}" th:if="${specialtyStat.index < 6}">
                <a th:href="@{/patient/doctors(specialtyId=${specialty.id})}" class="text-decoration-none">
                    <div class="card border-0 shadow-sm rounded-4 p-3 h-100">
                        <h5 class="fw-bold mb-1 text-dark" th:text="${specialty.name}">Tim mạch</h5>
                        <p class="text-secondary small mb-0" th:if="${specialty.description != null}" th:text="${specialty.description}">Mô tả</p>
                    </div>
                </a>
            </div>
        </div>
    </section>
</main>
</body>
</html>
