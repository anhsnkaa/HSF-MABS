<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>HealthSync - Danh Sách Bác Sĩ</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/patient-search.css}"/>
</head>
<body>
<main layout:fragment="content" class="container-fluid px-4 py-4" style="font-family: 'Inter', sans-serif;">
    <div class="row g-4">
        <!-- Sidebar Filter -->
        <aside class="col-lg-3">
            <div class="sidebar-sticky">
                <div class="mb-4">
                    <h2 class="h4 fw-bold mb-1">Bộ lọc</h2>
                    <p class="text-muted small">Tìm bác sĩ phù hợp với nhu cầu của bạn</p>
                </div>
                <form th:action="@{/patient/doctors}" method="get">
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-uppercase text-secondary">Tên bác sĩ</label>
                        <input name="keyword" class="form-control" placeholder="Nhập tên bác sĩ..."
                               th:value="${doctorSearch.keyword}"/>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-uppercase text-secondary" for="specialtyId">Chuyên khoa</label>
                        <select name="specialtyId" id="specialtyId" class="form-select">
                            <option value="">Tất cả chuyên khoa</option>
                            <option th:each="s : ${specialties}"
                                    th:value="${s.id}"
                                    th:text="${s.name}"
                                    th:selected="${doctorSearch.specialtyId != null && doctorSearch.specialtyId == s.id}">
                            </option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Áp dụng bộ lọc</button>
                </form>
            </div>
        </aside>

        <!-- Main Content -->
        <section class="col-lg-9">
            <!-- Search & Sort -->
            <div class="card border-0 shadow-sm rounded-4 mb-4">
                <div class="card-body p-3">
                    <form th:action="@{/patient/doctors}" method="get" class="row align-items-center">
                        <div class="col-md-7">
                            <div class="input-group">
                                <span class="input-group-text bg-light border-0">
                                    <span class="material-symbols-outlined text-muted">search</span>
                                </span>
                                <input name="keyword" class="form-control bg-light border-0"
                                       placeholder="Tìm tên bác sĩ hoặc bệnh lý..." type="text"
                                       th:value="${doctorSearch.keyword}"/>
                            </div>
                        </div>
                        <div class="col-md-5 d-flex justify-content-md-end align-items-center mt-3 mt-md-0">
                            <span class="text-muted small text-uppercase me-2">Sắp xếp:</span>
                            <select name="sortBy" class="form-select form-select-sm border-0 fw-bold text-primary w-auto"
                                    onchange="this.form.submit()">
                                <option value="">Mặc định</option>
                                <option value="experience" th:selected="${doctorSearch.sortBy == 'experience'}">Kinh nghiệm</option>
                                <option value="fee" th:selected="${doctorSearch.sortBy == 'fee'}">Giá: Thấp đến Cao</option>
                            </select>
                        </div>
                        <input type="hidden" name="specialtyId" th:value="${doctorSearch.specialtyId}"/>
                    </form>
                </div>
            </div>

            <!-- Doctor List -->
            <div th:if="${#lists.isEmpty(doctors)}" class="text-center py-5 text-muted">
                <p class="fs-5">Không tìm thấy bác sĩ phù hợp.</p>
                <a href="/patient/doctors" class="btn btn-outline-primary">Xóa bộ lọc</a>
            </div>

            <div th:unless="${#lists.isEmpty(doctors)}" class="d-flex flex-column gap-3">
                <div class="card border-0 shadow-sm rounded-4 overflow-hidden" th:each="doctor : ${doctors}">
                    <div class="row g-0">
                        <div class="col-auto bg-success" style="width: 6px;"></div>
                        <div class="col p-4">
                            <div class="flex-grow-1">
                                    <div class="d-flex justify-content-between align-items-start">
                                        <div>
                                            <a th:href="@{/patient/doctors/{id}(id=${doctor.id})}"
                                               class="text-decoration-none">
                                                <h3 class="h5 fw-bold mb-0 text-dark" th:text="${doctor.title != null ? doctor.title + ' ' + doctor.user.fullName : doctor.user.fullName}">BS. Name</h3>
                                            </a>
                                            <p class="text-primary fw-semibold small mb-2" th:text="${doctor.specialty.name}">Chuyên khoa</p>
                                        </div>
                                    </div>
                                    <div class="d-flex gap-4 mt-1 text-muted small">
                                        <div class="d-flex align-items-center gap-1">
                                            <span class="material-symbols-outlined fs-6">work_history</span>
                                            <span th:text="${doctor.experienceYears + ' năm kinh nghiệm'}">15 năm</span>
                                        </div>
                                    </div>
                                    <hr class="my-3 opacity-10"/>
                                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                                        <div>
                                            <div class="text-muted small">Phí tư vấn</div>
                                            <div class="h5 fw-bold mb-0" th:text="${#numbers.formatDecimal(doctor.consultationFee, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}">500.000 VNĐ</div>
                                        </div>
                                        <div class="d-flex gap-2">
                                            <a th:href="@{/book-appointment(doctorId=${doctor.id})}" class="btn btn-primary px-4 rounded-3 shadow-sm">Đặt lịch ngay</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>
</body>
</html>
