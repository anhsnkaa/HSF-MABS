<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Lịch hẹn của tôi - MABS</title>
</head>
<body>
<main layout:fragment="content" class="container py-5">

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm mb-4" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm mb-4" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row mb-4">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <h2 class="fw-bold">Lịch hẹn của tôi</h2>
            <a href="/book-appointment" class="btn btn-primary">+ Đặt lịch mới</a>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <div th:if="${#lists.isEmpty(appointments)}" class="text-center py-5 text-muted">
                <p class="fs-5">Bạn chưa có lịch hẹn nào.</p>
                <a href="/book-appointment" class="btn btn-primary">Đặt lịch ngay</a>
            </div>

            <div th:unless="${#lists.isEmpty(appointments)}" class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Bác sĩ</th>
                        <th>Chuyên khoa</th>
                        <th>Thời gian</th>
                        <th>Lý do</th>
                        <th>Trạng thái</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="appointment : ${appointments}">
                        <td>
                            <span class="fw-bold" th:text="${appointment.doctor.title + ' ' + appointment.doctor.user.fullName}">BS. Name</span>
                        </td>
                        <td th:text="${appointment.doctor.specialty.name}">Chuyên khoa</td>
                        <td th:text="${#temporals.format(appointment.appointmentTime, 'dd/MM/yyyy HH:mm')}">Time</td>
                        <td th:text="${appointment.reason}">Reason</td>
                        <td>
                                <span class="badge"
                                      th:classappend="${appointment.status == 'confirmed' ? 'bg-success' :
                                                      (appointment.status == 'cancelled' ? 'bg-secondary' :
                                                      (appointment.status == 'completed' ? 'bg-info' : 'bg-warning'))}"
                                      th:text="${appointment.status == 'confirmed' ? 'Đã xác nhận' :
                                                (appointment.status == 'cancelled' ? 'Đã hủy' :
                                                (appointment.status == 'completed' ? 'Hoàn thành' : 'Chờ xác nhận'))}">
                        </td>
                        <td>
                            <div th:if="${appointment.status == 'confirmed'}">
                                <form th:action="@{/appointments/{id}/cancel(id=${appointment.id})}" method="post"
                                      class="d-inline-flex align-items-center gap-1"
                                      onsubmit="return confirm('Xác nhận hủy lịch hẹn này?')">
                                    <input name="cancelReason" class="form-control form-control-sm"
                                           placeholder="Lý do hủy..." required style="width:140px;">
                                    <button type="submit" class="btn btn-outline-danger btn-sm">Hủy</button>
                                </form>
                                <a th:href="@{/appointments/{id}/reschedule(id=${appointment.id})}"
                                   class="btn btn-outline-primary btn-sm ms-1">Dời lịch</a>
                            </div>

                            <div th:if="${appointment.status == 'completed'}">
                                <span th:if="${reviewedAppointmentIds != null and #lists.contains(reviewedAppointmentIds, appointment.id)}"
                                      class="badge bg-success-subtle text-success border border-success px-2 py-1">
                                    <i class="bi bi-check-circle-fill me-1"></i>Đã đánh giá
                                </span>

                                <button th:unless="${reviewedAppointmentIds != null and #lists.contains(reviewedAppointmentIds, appointment.id)}"
                                        type="button" class="btn btn-outline-warning btn-sm text-dark fw-semibold"
                                        data-bs-toggle="modal" th:data-bs-target="'#reviewModal' + ${appointment.id}">
                                    ⭐ Đánh giá
                                </button>
                            </div>

                            <!-- Modal Đánh giá bác sĩ -->
                            <div th:if="${appointment.status == 'completed' and (reviewedAppointmentIds == null or !#lists.contains(reviewedAppointmentIds, appointment.id))}"
                                 class="modal fade" th:id="'reviewModal' + ${appointment.id}" tabindex="-1" aria-hidden="true">
                                <div class="modal-dialog modal-dialog-centered">
                                    <div class="modal-content text-start">
                                        <form th:action="@{/patient/reviews}" method="post">
                                            <div class="modal-header bg-warning bg-opacity-10">
                                                <h5 class="modal-title fw-bold text-dark">⭐ Đánh giá Bác sĩ</h5>
                                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                            </div>
                                            <div class="modal-body">
                                                <input type="hidden" name="appointmentId" th:value="${appointment.id}"/>
                                                <input type="hidden" name="doctorId" th:value="${appointment.doctor.id}"/>

                                                <div class="mb-3 p-2 bg-light rounded">
                                                    <div><strong>Bác sĩ:</strong> <span th:text="${appointment.doctor.title + ' ' + appointment.doctor.user.fullName}">BS. Name</span></div>
                                                    <div class="small text-muted">Chuyên khoa: <span th:text="${appointment.doctor.specialty.name}">Chuyên khoa</span></div>
                                                    <div class="small text-muted">Thời gian khám: <span th:text="${#temporals.format(appointment.appointmentTime, 'dd/MM/yyyy HH:mm')}">Time</span></div>
                                                </div>

                                                <div class="mb-3">
                                                    <label class="form-label fw-bold">Mức độ hài lòng:</label>
                                                    <select name="rating" class="form-select" required>
                                                        <option value="5" selected>⭐⭐⭐⭐⭐ (5 sao - Rất hài lòng)</option>
                                                        <option value="4">⭐⭐⭐⭐ (4 sao - Hài lòng)</option>
                                                        <option value="3">⭐⭐⭐ (3 sao - Bình thường)</option>
                                                        <option value="2">⭐⭐ (2 sao - Chưa hài lòng)</option>
                                                        <option value="1">⭐ (1 sao - Rất kém)</option>
                                                    </select>
                                                </div>

                                                <div class="mb-3">
                                                    <label class="form-label fw-bold">Nhận xét / Lời nhắn:</label>
                                                    <textarea name="comment" class="form-control" rows="3" placeholder="Hãy chia sẻ nhận xét của bạn về bác sĩ và quá trình khám..."></textarea>
                                                </div>
                                            </div>
                                            <div class="modal-footer">
                                                <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Đóng</button>
                                                <button type="submit" class="btn btn-warning btn-sm text-dark fw-bold">Gửi đánh giá</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </td>

                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
