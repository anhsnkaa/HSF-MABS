<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ghi chẩn đoán - MABS Doctor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/doctor-header :: navbar}"></div>
<main class="container my-5">
    <h2 class="mb-4">Ghi chẩn đoán</h2>

    <!-- alert lỗi -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- card thông tin appointment (readonly) -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-light"><strong>Thông tin lịch hẹn</strong></div>
        <div class="card-body row">
            <div class="col-md-4"><b>Bệnh nhân:</b> <span th:text="${appointment.patientName}"></span></div>
            <div class="col-md-4"><b>SĐT:</b> <span th:text="${appointment.patientPhone}"></span></div>
            <div class="col-md-4"><b>Email:</b> <span th:text="${appointment.patientEmail}"></span></div>
            <div class="col-md-6 mt-2"><b>Giờ khám:</b>
                <span th:text="${#temporals.format(appointment.appointmentTime, 'HH:mm dd/MM/yyyy')}"></span>
            </div>
            <div class="col-md-6 mt-2"><b>Lý do khám:</b> <span th:text="${appointment.reason}"></span></div>
        </div>
    </div>

    <form th:action="@{/doctor/record(action='save')}" method="post" class="card shadow-sm p-4">
        <input type="hidden" name="appointmentId" th:value="${appointmentId}">

        <div class="mb-3">
            <label class="form-label fw-bold">Triệu chứng</label>
            <textarea name="symptoms" class="form-control" rows="3"
                      placeholder="Mô tả triệu chứng do bệnh nhân khai..."></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Chẩn đoán <span class="text-danger">*</span></label>
            <textarea name="diagnosis" class="form-control" rows="4" required
                      placeholder="Nhập chẩn đoán của bác sĩ..."></textarea>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">Lời dặn</label>
            <textarea name="notes" class="form-control" rows="3"
                      placeholder="Lời khuyên / hướng dẫn cho bệnh nhân..."></textarea>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Lưu chẩn đoán</button>
            <a th:href="@{/doctors/schedule}" class="btn btn-outline-secondary">Hủy</a>
        </div>
    </form>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
