<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch khám hôm nay - MABS Doctor</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/doctor-header :: navbar}"></div>

<main class="container my-5">

    <!-- alerts -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Lịch khám ngày <span th:text="${date}"></span></h2>
        <a href="/doctor/schedule" class="btn btn-outline-primary btn-sm">Hôm nay</a>
    </div>

    <form th:action="@{/doctor/schedule}" method="get" class="row g-3 mb-4">
        <div class="col-md-3">
            <label class="form-label">Ngày khám</label>
            <input type="date" name="date" class="form-control" th:value="${date}">
        </div>
        <div class="col-md-3">
            <label class="form-label">Trạng thái</label>
            <select name="status" class="form-select">
                <option value="">-- Tất cả --</option>
                <option value="pending"   th:selected="${status == 'pending'}">Chờ xác nhận</option>
                <option value="confirmed" th:selected="${status == 'confirmed'}">Đã xác nhận</option>
                <option value="completed" th:selected="${status == 'completed'}">Đã khám</option>
                <option value="cancelled" th:selected="${status == 'cancelled'}">Đã hủy</option>
            </select>
        </div>
        <div class="col-md-3 d-flex align-items-end">
            <button type="submit" class="btn btn-primary w-100">Lọc</button>
        </div>
    </form>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>Giờ khám</th>
                    <th>Bệnh nhân</th>
                    <th>SĐT</th>
                    <th>Lý do khám</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(appointments)}">
                    <td colspan="7" class="text-center text-muted py-4">
                        Không có lịch hẹn nào trong ngày này.
                    </td>
                </tr>
                <tr th:each="appt, iter : ${appointments}">
                    <td th:text="${iter.count}"></td>
                    <td>
                        <strong th:text="${#temporals.format(appt.appointmentTime, 'HH:mm')}"></strong>
                        <br>
                        <small class="text-muted"
                               th:text="${#temporals.format(appt.appointmentTime, 'dd/MM/yyyy')}"></small>
                    </td>
                    <td><strong th:text="${appt.patientName}"></strong></td>
                    <td th:text="${appt.patientPhone}"></td>
                    <td>
                            <span class="d-inline-block text-truncate" style="max-width: 200px;"
                                  th:title="${appt.reason}" th:text="${appt.reason}"></span>
                    </td>
                    <td>
                            <span th:switch="${appt.status}">
                                <span th:case="'pending'"   class="badge bg-warning text-dark">Chờ xác nhận</span>
                                <span th:case="'confirmed'" class="badge bg-info">Đã xác nhận</span>
                                <span th:case="'completed'" class="badge bg-success">Đã khám</span>
                                <span th:case="'cancelled'" class="badge bg-secondary">Đã hủy</option>
                                    <span th:case="*"           class="badge bg-light text-dark"
                                          th:text="${appt.status}"></span>
                            </span>
                    </td>
                    <td>
                        <a th:href="@{/doctor/schedule(action='detail', id=${appt.id})}"
                           class="btn btn-sm btn-outline-secondary">Chi tiết</a>

                        <a th:if="${appt.status == 'confirmed' or appt.status == 'pending'}"
                           th:href="@{/doctor/record(action='create', appointmentId=${appt.id})}"
                           class="btn btn-sm btn-primary">Ghi chẩn đoán</a>

                        <a th:href="@{/doctor/patient-history(action='view', patientId=${appt.patientId})}"
                           class="btn btn-sm btn-outline-info">Lịch sử</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
