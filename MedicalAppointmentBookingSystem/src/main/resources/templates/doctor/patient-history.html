<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử khám bệnh - MABS Doctor</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-5">

    <!-- error alert từ redirect -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">
            Hồ sơ khám của: <span th:text="${patient.fullName}"></span>
        </h2>
        <a th:href="@{/doctor/schedule}" class="btn btn-outline-secondary btn-sm">
            &larr; Quay lại lịch khám
        </a>
    </div>

    <!-- card thông tin bệnh nhân -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-light"><strong>Thông tin bệnh nhân</strong></div>
        <div class="card-body row">
            <div class="col-md-4 mb-2">
                <span class="text-muted d-block">Họ tên</span>
                <strong th:text="${patient.fullName}"></strong>
            </div>
            <div class="col-md-4 mb-2">
                <span class="text-muted d-block">SĐT</span>
                <strong th:text="${patient.phone}"></strong>
            </div>
            <div class="col-md-4 mb-2">
                <span class="text-muted d-block">Email</span>
                <strong th:text="${patient.email}"></strong>
            </div>
            <div class="col-md-4 mb-2">
                <span class="text-muted d-block">Giới tính</span>
                <strong th:text="${patient.gender != null ? patient.gender : '(chưa cập nhật)'}"></strong>
            </div>
            <div class="col-md-4 mb-2">
                <span class="text-muted d-block">Ngày sinh</span>
                <strong th:text="${patient.dateOfBirth != null ? patient.dateOfBirth : '(chưa cập nhật)'}"></strong>
            </div>
            <div class="col-md-4 mb-2">
                <span class="text-muted d-block">Trạng thái</span>
                <span class="badge"
                      th:classappend="${patient.status == 'active' ? 'bg-success' : 'bg-secondary'}"
                      th:text="${patient.status == 'active' ? 'Hoạt động' : 'Bị khóa'}"></span>
            </div>
        </div>
    </div>

    <!-- empty state -->
    <div th:if="${#lists.isEmpty(records)}" class="alert alert-info">
        Bệnh nhân chưa có lịch sử khám bệnh nào.
    </div>

    <!-- danh sách hồ sơ -->
    <div th:each="record : ${records}" class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <strong>Lần khám #<span th:text="${record.id}"></span></strong>
            <span class="badge bg-light text-dark"
                  th:text="${record.visitDate}">2026-06-30</span>
        </div>
        <div class="card-body">
            <div class="mb-2">
                <span class="text-muted d-block">Triệu chứng</span>
                <span th:text="${record.symptom != null ? record.symptom : '(không có)'}"></span>
            </div>
            <div class="mb-2">
                <span class="text-muted d-block">Chẩn đoán</span>
                <strong th:text="${record.diagnosis}"></strong>
            </div>
            <div class="mb-3">
                <span class="text-muted d-block">Lời dặn</span>
                <span th:text="${record.note != null ? record.note : '(không có)'}"></span>
            </div>

            <h6 class="text-primary mt-3">Đơn thuốc</h6>
            <div th:if="${#lists.isEmpty(record.prescriptions)}" class="text-muted fst-italic small">
                Không có đơn thuốc.
            </div>
            <table class="table table-bordered table-sm"
                   th:unless="${#lists.isEmpty(record.prescriptions)}">
                <thead class="table-light">
                <tr>
                    <th>Thuốc</th>
                    <th>ĐV</th>
                    <th>SL</th>
                    <th>Liều</th>
                    <th>Tần suất</th>
                    <th>Ngày</th>
                    <th>Ghi chú</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${record.prescriptions}">
                    <td th:text="${p.medicineName}"></td>
                    <td th:text="${p.unit}"></td>
                    <td th:text="${p.quantity}"></td>
                    <td th:text="${p.dosage}"></td>
                    <td th:text="${p.frequency}"></td>
                    <td th:text="${p.durationDays}"></td>
                    <td th:text="${p.note}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
