<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Doctor Dashboard - MABS</title>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<main layout:fragment="content" class="container py-5">
    <div class="row mb-4">
        <div class="col-12">
            <h2 class="fw-bold">Xin chào Bác sĩ, <span th:text="${user.fullName}" class="text-primary">...</span>!</h2>
            <p class="text-muted">Chào mừng đến với bảng điều khiển dành cho Bác sĩ. Dưới đây là lịch làm việc hôm nay của bạn.</p>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-12">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 fw-bold text-success"><i class="bi bi-calendar3 me-2"></i>Lịch khám hôm nay</h5>
                </div>
                <div class="card-body py-5 text-center text-muted">
                    <i class="bi bi-clock-history fs-1"></i>
                    <p class="mt-3 mb-0">Đang đồng bộ lịch khám từ các thành viên khác...</p>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
