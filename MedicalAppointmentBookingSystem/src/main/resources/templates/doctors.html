<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Tìm bác sĩ - MABS</title>
</head>
<body>
<main layout:fragment="content" class="container py-5">
    <div class="row mb-4">
        <div class="col-12">
            <h2 class="fw-bold">Tìm bác sĩ</h2>
        </div>
    </div>

    <div class="row">
        <!-- Filter Sidebar -->
        <div class="col-md-3">
            <div class="card shadow-sm border-0">
                <div class="card-body">
                    <h5 class="fw-bold mb-3">Bộ lọc</h5>
                    <form th:action="@{/doctors}" method="get">
                        <div class="mb-3">
                            <label class="form-label">Chuyên khoa</label>
                            <select name="specialtyId" class="form-select">
                                <option value="">Tất cả</option>
                                <option th:each="s : ${specialties}"
                                        th:value="${s.id}"
                                        th:text="${s.name}"
                                        th:selected="${criteria.specialtyId != null && criteria.specialtyId == s.id}">
                                </option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tên bác sĩ</label>
                            <input type="text" name="keyword" class="form-control"
                                   th:value="${criteria.keyword}" placeholder="Nhập tên...">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Đánh giá tối thiểu</label>
                            <select name="minRating" class="form-select">
                                <option value="">Bất kỳ</option>
                                <option value="3" th:selected="${criteria.minRating != null && criteria.minRating == 3}">3 sao trở lên</option>
                                <option value="4" th:selected="${criteria.minRating != null && criteria.minRating == 4}">4 sao trở lên</option>
                                <option value="5" th:selected="${criteria.minRating != null && criteria.minRating == 5}">5 sao</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Sắp xếp</label>
                            <select name="sortBy" class="form-select">
                                <option value="">Mặc định</option>
                                <option value="rating" th:selected="${criteria.sortBy == 'rating'}">Đánh giá cao nhất</option>
                                <option value="experience" th:selected="${criteria.sortBy == 'experience'}">Kinh nghiệm nhiều nhất</option>
                                <option value="fee" th:selected="${criteria.sortBy == 'fee'}">Phí thấp nhất</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Tìm kiếm</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Results -->
        <div class="col-md-9">
            <div th:if="${#lists.isEmpty(doctors)}" class="text-center py-5 text-muted">
                <p class="fs-5">Không tìm thấy bác sĩ phù hợp.</p>
            </div>

            <div class="row g-3">
                <div class="col-md-6" th:each="doctor : ${doctors}">
                    <div class="card shadow-sm border-0 h-100">
                        <div class="card-body">
                            <div class="d-flex align-items-center mb-3">
                                <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center me-3"
                                     style="width: 60px; height: 60px; font-size: 20px; font-weight: bold;">
                                    <span th:text="${#strings.substring(doctor.user.fullName, 0, 1)}">A</span>
                                </div>
                                <div>
                                    <h5 class="mb-0" th:text="${doctor.title != null ? doctor.title + ' ' + doctor.user.fullName : doctor.user.fullName}">BS. Name</h5>
                                    <small class="text-muted" th:text="${doctor.specialty.name}">Chuyên khoa</small>
                                </div>
                            </div>

                            <p class="text-muted small mb-2" th:if="${doctor.bio != null}" th:text="${doctor.bio}">Bio</p>

                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span>
                                    <span class="text-warning fw-bold" th:text="${doctor.ratingAvg}">0.0</span>
                                    <span class="text-muted small">/5</span>
                                    <span class="text-muted small" th:text="'(' + ${doctor.ratingCount} + ' đánh giá)'"></span>
                                </span>
                                <span class="text-muted small" th:text="${doctor.experienceYears + ' năm kn'}">10 năm</span>
                            </div>

                            <div class="d-flex justify-content-between align-items-center">
                                <span class="fw-bold text-danger" th:text="${#numbers.formatDecimal(doctor.consultationFee, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}">300,000 VNĐ</span>
                                <a th:href="@{/book-appointment(doctorId=${doctor.id})}" class="btn btn-primary btn-sm">Đặt lịch</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
