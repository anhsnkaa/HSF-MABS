<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ bệnh án</title>
</head>
<body>
<div layout:fragment="content" class="container py-4">
    <h1 class="text-primary mb-4 border-bottom pb-2">Hồ sơ bệnh án của tôi</h1>

    <div class="alert alert-info text-center" th:if="${#lists.isEmpty(records)}">
        Chưa có hồ sơ bệnh án nào.
    </div>

    <div class="card mb-4 shadow-sm" th:each="record : ${records}">
        <div class="card-header d-flex justify-content-between align-items-center bg-light">
            <strong>Lần khám
                <span th:if="${record.doctorName != null and record.doctorName != 'N/A'}"
                      th:text="' - Bác sĩ: ' + ${record.doctorName}"> - Bác sĩ: ...</span>
            </strong>
            <span class="badge bg-primary rounded-pill" th:text="${record.visitDate}">2026-01-01</span>
        </div>
        <div class="card-body">
            <div class="mb-2">
                <span class="fw-semibold text-secondary">Triệu chứng:</span>
                <span th:text="${record.symptom}">...</span>
            </div>
            <div class="mb-2">
                <span class="fw-semibold text-secondary">Chẩn đoán:</span>
                <span th:text="${record.diagnosis}">...</span>
            </div>
            <div class="mb-3">
                <span class="fw-semibold text-secondary">Lời dặn:</span>
                <span th:text="${record.note}">...</span>
            </div>

            <h5 class="text-primary mt-3 mb-2">Đơn thuốc</h5>
            <div th:if="${#lists.isEmpty(record.prescriptions)}" class="text-muted fst-italic">
                Không có đơn thuốc.
            </div>
            <table class="table table-bordered table-hover" th:unless="${#lists.isEmpty(record.prescriptions)}">
                <thead class="table-light">
                    <tr>
                        <th>Thuốc</th>
                        <th>Đơn vị</th>
                        <th>Số lượng</th>
                        <th>Liều</th>
                        <th>Tần suất</th>
                        <th>Số ngày</th>
                        <th>Ghi chú</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${record.prescriptions}">
                        <td th:text="${p.medicineName}">Paracetamol</td>
                        <td th:text="${p.unit}">viên</td>
                        <td th:text="${p.quantity}">20</td>
                        <td th:text="${p.dosage}">1 viên/lần</td>
                        <td th:text="${p.frequency}">2 lần/ngày</td>
                        <td th:text="${p.durationDays}">10</td>
                        <td th:text="${p.note}">Uống sau ăn</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
