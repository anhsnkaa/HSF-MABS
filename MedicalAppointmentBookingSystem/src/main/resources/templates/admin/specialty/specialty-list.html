<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <meta charset="utf-8">
    <title>Quản lý chuyên khoa</title>
</head>
<body>
    <div layout:fragment="content" class="container py-5">
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-1"></i>
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Quản lý chuyên khoa</h2>
            <a th:href="@{/specialties/add}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i> Thêm chuyên khoa
            </a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Tên chuyên khoa</th>
                                <th>Mô tả</th>
                                <th class="text-center">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="specialty : ${specialtyList}">
                                <td th:text="${specialty.id}"></td>
                                <td>
                                    <div class="d-flex align-items-center gap-2">
                                        <div class="bg-success bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center" style="width:32px;height:32px;">
                                            <i class="bi bi-clipboard2-pulse-fill text-success small"></i>
                                        </div>
                                        <span class="fw-medium" th:text="${specialty.name}"></span>
                                    </div>
                                </td>
                                <td class="text-muted" th:text="${specialty.description}"></td>
                                <td class="text-center text-nowrap">
                                    <form th:action="@{/specialties/update-form}" method="post" class="d-inline">
                                        <input type="hidden" name="id" th:value="${specialty.id}">
                                        <button type="submit" class="btn btn-sm btn-outline-primary me-1">
                                            <i class="bi bi-pencil-square"></i>
                                        </button>
                                    </form>
                                    <form th:action="@{/specialties/delete}" method="post" class="d-inline">
                                        <input type="hidden" name="id" th:value="${specialty.id}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                                onclick="return confirm('Bạn có chắc muốn xóa chuyên khoa này?')">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
