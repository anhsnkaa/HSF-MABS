<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Cập nhật tài khoản</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="">
</head>

<body>
    <div layout:fragment="content" class="container py-5">
        <div class="card col-md-8 mx-auto p-4">
            <form th:action="@{/accounts/update/{id}(id = ${dto.id})}" th:object="${dto}" method="post">
                <div class="mb-3">
                    <label>Avatar</label>
                    <input type="text" th:field="*{avatarUrl}" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Full name</label>
                    <input type="text" th:field="*{fullName}" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" class="form-control">
                    <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                </div>
                <div class="mb-3">
                    <label>Phone</label>
                    <input type="text" th:field="*{phone}" class="form-control">
                    <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></p>
                </div>
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" class="form-control">
                    <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                </div>
                <div class="mb-3">
                    <label>Role</label>
                    <select th:field="*{role}" class="form-control">
                        <option value="admin">Admin</option>
                        <option value="doctor">Doctor</option>
                        <option value="patient">Patient</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Status</label>
                    <select th:field="*{status}" class="form-control">
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                        <option value="locked">Locked</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Gender</label>
                    <select th:field="*{gender}" class="form-control">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Date of birth</label>
                    <input type="date" th:field="*{dateOfBirth}" class="form-control">
                </div>
                <div class="mb-3">
                    <label>Address</label>
                    <input type="text" th:field="*{address}" class="form-control">
                </div>
                <button type="submit">Update</button>
            </form>
        </div>
    </div>

    <script src="" async defer></script>
</body>

</html>
