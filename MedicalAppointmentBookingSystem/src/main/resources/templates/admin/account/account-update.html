<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <meta charset="utf-8">
    <title>Cập nhật tài khoản</title>
</head>
<body>
    <div layout:fragment="content" class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Cập nhật tài khoản</h2>
            <a href="/accounts" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i> Quay lại
            </a>
        </div>

        <div class="card col-md-8 mx-auto shadow-sm border-0">
            <div class="card-body p-4">
                <form th:action="@{/accounts/update}" th:object="${dto}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Avatar URL</label>
                        <input type="text" th:field="*{avatarUrl}" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Họ tên <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{fullName}" class="form-control">
                        <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email <span class="text-danger">*</span></label>
                        <input type="email" th:field="*{email}" class="form-control">
                        <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Số điện thoại</label>
                        <input type="text" th:field="*{phone}" class="form-control">
                        <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Mật khẩu mới</label>
                        <input type="password" th:field="*{password}" class="form-control" placeholder="Để trống nếu không muốn thay đổi">
                        <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Vai trò</label>
                            <select th:field="*{role}" class="form-select">
                                <option value="patient">Bệnh nhân</option>
                                <option value="doctor">Bác sĩ</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Trạng thái</label>
                            <select th:field="*{status}" class="form-select">
                                <option value="active">Hoạt động</option>
                                <option value="inactive">Không hoạt động</option>
                                <option value="locked">Khóa</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Giới tính</label>
                            <select th:field="*{gender}" class="form-select">
                                <option value="male">Nam</option>
                                <option value="female">Nữ</option>
                                <option value="other">Khác</option>
                            </select>
                        </div>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Ngày sinh</label>
                            <input type="date" th:field="*{dateOfBirth}" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Địa chỉ</label>
                            <input type="text" th:field="*{address}" class="form-control">
                        </div>
                    </div>
                    <input type="hidden" name="id" th:field="*{id}">
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-check-lg me-1"></i> Cập nhật
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
