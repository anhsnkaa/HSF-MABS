<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <meta charset="utf-8">
    <title>Quản lý tài khoản</title>
</head>
<body>
    <div layout:fragment="content" class="container py-5">
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-1"></i>
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Quản lý tài khoản</h2>
            <a th:href="@{/accounts/add}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i> Thêm tài khoản
            </a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Họ tên</th>
                                <th>Email</th>
                                <th>Số điện thoại</th>
                                <th>Vai trò</th>
                                <th>Trạng thái</th>
                                <th>Giới tính</th>
                                <th>Ngày tạo</th>
                                <th class="text-center">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="account, iter : ${accountList}">
                                <td th:text="${iter.count}"></td>
                                <td>
                                    <div class="d-flex align-items-center gap-2">
                                        <div class="bg-primary bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center" style="width:32px;height:32px;">
                                            <i class="bi bi-person-fill text-primary small"></i>
                                        </div>
                                        <span class="fw-medium" th:text="${account.fullName}"></span>
                                    </div>
                                </td>
                                <td th:text="${account.email}"></td>
                                <td th:text="${account.phone}"></td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${account.role == 'admin' ? 'bg-danger' : account.role == 'doctor' ? 'bg-info' : 'bg-success'}"
                                          th:text="${account.role}"></span>
                                </td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${account.status == 'active' ? 'bg-success' : account.status == 'locked' ? 'bg-danger' : 'bg-secondary'}"
                                          th:text="${account.status}"></span>
                                </td>
                                <td th:text="${account.gender}"></td>
                                <td th:text="${#temporals.format(account.createdAt, 'dd/MM/yyyy')}"></td>
                                <td class="text-center text-nowrap">
                                    <form th:action="@{/accounts/update-form}" method="post" class="d-inline">
                                        <input type="hidden" name="id" th:value="${account.id}">
                                        <button type="submit" class="btn btn-sm btn-outline-primary me-1">
                                            <i class="bi bi-pencil-square"></i>
                                        </button>
                                    </form>
                                    <form th:if="${#authentication.principal.username != account.email}"
                                          th:action="@{/accounts/delete}" method="post" class="d-inline">
                                        <input type="hidden" name="id" th:value="${account.id}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                                onclick="return confirm('Bạn có chắc muốn xóa tài khoản này?')">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
