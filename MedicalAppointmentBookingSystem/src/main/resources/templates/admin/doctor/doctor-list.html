<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <meta charset="utf-8">
    <title>Quản lý bác sĩ</title>
</head>
<body>
    <div layout:fragment="content" class="container py-5">
        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-1"></i>
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Quản lý bác sĩ</h2>
            <a th:href="@{/doctors/add}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i> Thêm bác sĩ
            </a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Họ tên</th>
                                <th>Chuyên khoa</th>
                                <th>Chức danh</th>
                                <th>Phí khám</th>
                                <th>Kinh nghiệm</th>
                                <th class="text-center">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="doctor : ${doctorList}">
                                <td th:text="${doctor.id}"></td>
                                <td>
                                    <div class="d-flex align-items-center gap-2">
                                        <div class="bg-info bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center" style="width:32px;height:32px;">
                                            <i class="bi bi-person-badge-fill text-info small"></i>
                                        </div>
                                        <span class="fw-medium" th:text="${doctor.user.fullName}"></span>
                                    </div>
                                </td>
                                <td><span class="badge bg-light text-dark" th:text="${doctor.specialty.name}"></span></td>
                                <td th:text="${doctor.title}"></td>
                                <td th:text="${#numbers.formatDecimal(doctor.consultationFee, 0, 'COMMA', 0, 'DEFAULT') + ' VNĐ'}"></td>
                                <td><span class="badge bg-secondary" th:text="${doctor.experienceYears + ' năm'}"></span></td>
                                <td class="text-center text-nowrap">
                                    <form th:action="@{/doctors/update-form}" method="post" class="d-inline">
                                        <input type="hidden" name="id" th:value="${doctor.id}">
                                        <button type="submit" class="btn btn-sm btn-outline-primary me-1">
                                            <i class="bi bi-pencil-square"></i>
                                        </button>
                                    </form>
                                    <form th:action="@{/doctors/delete}" method="post" class="d-inline">
                                        <input type="hidden" name="id" th:value="${doctor.id}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                                onclick="return confirm('Bạn có chắc muốn xóa bác sĩ này?')">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
