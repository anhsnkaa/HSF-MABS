<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <meta charset="utf-8">
    <title>Thêm bác sĩ</title>
</head>
<body>
    <div layout:fragment="content" class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Thêm hồ sơ bác sĩ</h2>
            <a href="/doctors" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i> Quay lại
            </a>
        </div>

        <div class="card col-md-8 mx-auto shadow-sm border-0">
            <div class="card-body p-4">
                <form th:action="@{/doctors/add}" th:object="${dto}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tài khoản người dùng <span class="text-danger">*</span></label>
                        <select th:field="*{userId}" class="form-select">
                            <option value="">-- Chọn người dùng --</option>
                            <option th:each="user : ${doctorRoleList}" th:value="${user.id}" th:text="${user.fullName}"></option>
                        </select>
                        <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}"></p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Chuyên khoa <span class="text-danger">*</span></label>
                        <select th:field="*{specialtyId}" class="form-select">
                            <option value="">-- Chọn chuyên khoa --</option>
                            <option th:each="specialty : ${specialtyList}" th:value="${specialty.id}" th:text="${specialty.name}"></option>
                        </select>
                        <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('specialtyId')}" th:errors="*{specialtyId}"></p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Chức danh</label>
                        <input type="text" th:field="*{title}" class="form-control" placeholder="VD: Tiến sĩ, Thạc sĩ...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Giới thiệu</label>
                        <input type="text" th:field="*{bio}" class="form-control" placeholder="Mô tả ngắn về bác sĩ">
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Phí khám (VNĐ)</label>
                            <input type="number" th:field="*{consultationFee}" class="form-control" placeholder="0">
                            <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('consultationFee')}" th:errors="*{consultationFee}"></p>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Kinh nghiệm (năm)</label>
                            <input type="number" th:field="*{experienceYears}" class="form-control" placeholder="0">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary px-4">
                        <i class="bi bi-plus-lg me-1"></i> Tạo hồ sơ
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
