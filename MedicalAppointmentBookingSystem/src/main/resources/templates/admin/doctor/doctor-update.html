<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head>
    <meta charset="utf-8">
    <title>Cập nhật hồ sơ bác sĩ</title>
</head>
<body>
    <div layout:fragment="content" class="container py-5">
        <div class="col-md-8 mx-auto">
            <a th:href="@{/admin/doctors}" class="btn btn-outline-secondary btn-sm mb-3">
                <i class="bi bi-arrow-left me-1"></i> Quay lại
            </a>
            <h2 class="fw-bold">Cập nhật hồ sơ bác sĩ</h2>
            <p class="text-muted">Chỉnh sửa thông tin bác sĩ bên dưới</p>

            <div class="card shadow-sm border-0 p-4">
                <form th:action="@{/admin/doctors/update/{id}(id=${dto.id})}" th:object="${dto}" method="post">
                    <input type="hidden" name="id" th:field="*{id}">
                    <div class="mb-3">
                        <label class="form-label fw-medium">Người dùng</label>
                        <select th:field="*{userId}" class="form-select">
                            <option value="">-- Chọn người dùng --</option>
                            <option th:each="user : ${doctorRoleList}" th:value="${user.id}" th:text="${user.fullName}"></option>
                        </select>
                        <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}"></p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Chuyên khoa</label>
                        <select th:field="*{specialtyId}" class="form-select">
                            <option value="">-- Chọn chuyên khoa --</option>
                            <option th:each="specialty : ${specialtyList}" th:value="${specialty.id}" th:text="${specialty.name}"></option>
                        </select>
                        <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('specialtyId')}" th:errors="*{specialtyId}"></p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Học hàm / Học vị</label>
                        <input type="text" th:field="*{title}" class="form-control" placeholder="VD: PGS.TS, TS.BS, ThS.BS...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Giới thiệu</label>
                        <textarea th:field="*{bio}" class="form-control" rows="3" placeholder="Mô tả ngắn về bác sĩ..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Phí khám (VNĐ)</label>
                        <input type="number" th:field="*{consultationFee}" class="form-control" placeholder="VD: 200000" min="0">
                        <p class="text-danger small mt-1 mb-0" th:if="${#fields.hasErrors('consultationFee')}" th:errors="*{consultationFee}"></p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">Kinh nghiệm (năm)</label>
                        <input type="number" th:field="*{experienceYears}" class="form-control" placeholder="VD: 10" min="0">
                    </div>
                    <div class="d-flex justify-content-end gap-2 pt-2">
                        <a th:href="@{/admin/doctors}" class="btn btn-secondary">Hủy</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-1"></i> Cập nhật
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
