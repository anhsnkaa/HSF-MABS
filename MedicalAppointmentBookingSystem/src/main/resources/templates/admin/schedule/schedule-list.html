<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>Quản lí lịch làm việc</title>
</head>
<body>
<div layout:fragment="content" class="container py-4">
    <h1 class="text-primary mb-3">Quản lí lịch làm việc</h1>

    <div class="alert alert-success" th:if="${message}" th:text="${message}"></div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <div class="mb-3 d-flex gap-2">
        <a th:href="@{/schedules/add}" class="btn btn-primary">Thêm lịch</a>
        <a th:href="@{/schedules/add-month}" class="btn btn-outline-primary">Thêm theo tháng</a>
    </div>

    <form th:action="@{/schedules}" method="get" class="card card-body mb-3 shadow-sm">
        <div class="row g-2 align-items-end">
            <div class="col-md-3">
                <label class="form-label">Tìm tên bác sĩ</label>
                <input type="text" name="keyword" class="form-control" th:value="${keyword}"
                       placeholder="Nhập tên bác sĩ">
            </div>
            <div class="col-md-2">
                <label class="form-label">Bác sĩ</label>
                <select name="doctorId" class="form-select">
                    <option value="">-- Tất cả --</option>
                    <option th:each="d : ${doctorList}"
                            th:value="${d.id}"
                            th:text="${d.user.fullName}"
                            th:selected="${doctorId != null and doctorId == d.id}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                    <option value="">-- Tất cả --</option>
                    <option value="open" th:selected="${status == 'open'}">open</option>
                    <option value="full" th:selected="${status == 'full'}">full</option>
                    <option value="cancelled" th:selected="${status == 'cancelled'}">cancelled</option>
                </select>
            </div>
            <div class="col-md-1">
                <label class="form-label">Tháng</label>
                <select name="month" class="form-select">
                    <option value="">--</option>
                    <option th:each="m : ${#numbers.sequence(1, 12)}"
                            th:value="${m}"
                            th:text="${m}"
                            th:selected="${month != null and month == m}"></option>
                </select>
            </div>
            <div class="col-md-1">
                <label class="form-label">Năm</label>
                <input type="number" name="year" class="form-control" th:value="${year}"
                       placeholder="YYYY" min="2020" max="2100">
            </div>
            <div class="col-md-3 d-flex gap-2">
                <button type="submit" class="btn btn-primary">Lọc</button>
                <a th:href="@{/schedules}" class="btn btn-outline-secondary">Xóa lọc</a>
            </div>
        </div>
        <input type="hidden" name="size" th:value="${page != null ? page.size : 10}">
    </form>

    <div class="mb-2 text-muted small"
         th:if="${page != null}"
         th:text="'Tổng: ' + ${page.totalElements} + ' lịch | Trang ' + (${page.number} + 1) + '/' + (${page.totalPages == 0 ? 1 : page.totalPages})">
    </div>

    <table class="table table-bordered table-hover">
        <thead class="table-light">
        <tr>
            <th>#</th>
            <th>Bác sĩ</th>
            <th>Ngày</th>
            <th>Giờ</th>
            <th>Slot (phút)</th>
            <th>Status</th>
            <th>Sửa</th>
            <th>Xóa</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(workingSchedules)}">
            <td colspan="8" class="text-center text-muted">Không có lịch làm việc phù hợp.</td>
        </tr>
        <tr th:each="s, iter : ${workingSchedules}">
            <td th:text="${page.number * page.size + iter.count}">1</td>
            <td th:text="${s.doctor != null and s.doctor.user != null ? s.doctor.user.fullName : 'N/A'}"></td>
            <td th:text="${#temporals.format(s.workDate, 'dd/MM/yyyy')}"></td>
            <td th:text="${#temporals.format(s.startTime, 'HH:mm') + ' - ' + #temporals.format(s.endTime, 'HH:mm')}"></td>
            <td th:text="${s.slotMinutes}"></td>
            <td th:text="${s.status}"></td>
            <td>
                <form th:action="@{/schedules/update-form}" method="post">
                    <input type="hidden" name="id" th:value="${s.id}">
                    <button type="submit" class="btn btn-sm btn-outline-primary">Sửa</button>
                </form>
            </td>
            <td>
                <form th:action="@{/schedules/delete}" method="post"
                      onsubmit="return confirm('Xóa lịch này?');">
                    <input type="hidden" name="id" th:value="${s.id}">
                    <button type="submit" class="btn btn-sm btn-outline-danger">Xóa</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${page != null and page.totalPages > 1}" class="mt-3">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/schedules(page=${page.number - 1}, size=${page.size}, keyword=${keyword}, doctorId=${doctorId}, status=${status}, year=${year}, month=${month})}">«</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                th:classappend="${i == page.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/schedules(page=${i}, size=${page.size}, keyword=${keyword}, doctorId=${doctorId}, status=${status}, year=${year}, month=${month})}"
                   th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/schedules(page=${page.number + 1}, size=${page.size}, keyword=${keyword}, doctorId=${doctorId}, status=${status}, year=${year}, month=${month})}">»</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
