<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>Thêm lịch theo tháng</title>
</head>
<body>
<div layout:fragment="content" class="container py-5">
    <div class="card col-md-8 mx-auto p-4">
        <h3 class="mb-3">Thêm lịch làm việc theo tháng</h3>
        <p class="text-muted small">Tạo ca làm việc cho <strong>tất cả ngày</strong> trong tháng. Ngày đã có slot trùng sẽ được bỏ qua.</p>
        <form th:action="@{/schedules/add-month}" th:object="${dto}" method="post">
            <div class="mb-3">
                <label class="form-label">Bác sĩ</label>
                <select th:field="*{doctorId}" class="form-select">
                    <option value="">-- Chọn bác sĩ --</option>
                    <option th:each="d : ${doctorList}"
                            th:value="${d.id}"
                            th:text="${d.user.fullName}"></option>
                </select>
                <p class="text-danger small" th:if="${#fields.hasErrors('doctorId')}" th:errors="*{doctorId}"></p>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Năm</label>
                    <input type="number" th:field="*{year}" class="form-control" min="2020" max="2100">
                    <p class="text-danger small" th:if="${#fields.hasErrors('year')}" th:errors="*{year}"></p>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tháng</label>
                    <select th:field="*{month}" class="form-select">
                        <option th:each="m : ${#numbers.sequence(1, 12)}"
                                th:value="${m}"
                                th:text="${m}"></option>
                    </select>
                    <p class="text-danger small" th:if="${#fields.hasErrors('month')}" th:errors="*{month}"></p>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Giờ bắt đầu</label>
                <input type="time" th:field="*{startTime}" class="form-control">
                <p class="text-danger small" th:if="${#fields.hasErrors('startTime')}" th:errors="*{startTime}"></p>
            </div>
            <div class="mb-3">
                <label class="form-label">Giờ kết thúc</label>
                <input type="time" th:field="*{endTime}" class="form-control">
                <p class="text-danger small" th:if="${#fields.hasErrors('endTime')}" th:errors="*{endTime}"></p>
            </div>
            <div class="mb-3">
                <label class="form-label">Slot (phút)</label>
                <input type="number" th:field="*{slotMinutes}" class="form-control" min="1">
                <p class="text-danger small" th:if="${#fields.hasErrors('slotMinutes')}" th:errors="*{slotMinutes}"></p>
            </div>
            <div class="mb-3">
                <label class="form-label">Status</label>
                <select th:field="*{status}" class="form-select">
                    <option value="open">open</option>
                    <option value="full">full</option>
                    <option value="cancelled">cancelled</option>
                </select>
                <p class="text-danger small" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></p>
            </div>
            <button type="submit" class="btn btn-primary">Tạo cả tháng</button>
            <a th:href="@{/schedules}" class="btn btn-secondary">Hủy</a>
        </form>
    </div>
</div>
</body>
</html>
