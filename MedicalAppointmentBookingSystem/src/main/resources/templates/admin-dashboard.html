<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Admin Dashboard - MABS</title>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<main layout:fragment="content" class="container py-5">
    <div class="row mb-4">
        <div class="col-12">
            <h2 class="fw-bold">Xin chào Admin, <span th:text="${user.fullName}" class="text-primary">...</span>!</h2>
            <p class="text-muted">Chào mừng đến với trang quản trị hệ thống.</p>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-12">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0 fw-bold text-danger"><i class="bi bi-shield-lock me-2"></i>Quản trị hệ thống</h5>
                </div>
                <div class="card-body py-5 text-center text-muted">
                    <i class="bi bi-gear-fill fs-1 spinner-border text-danger" style="width: 3rem; height: 3rem; border: none;"></i>
                    <p class="mt-3 mb-0">Các tính năng quản lý đang được đồng bộ và tích hợp...</p>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
