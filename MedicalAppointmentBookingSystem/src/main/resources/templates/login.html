<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content" class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="text-center mb-4">Đăng nhập</h3>

                    <!-- Alert for Error -->
                    <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show shadow-sm mb-4 rounded-3" role="alert">
                        <span>Email hoặc mật khẩu không chính xác.</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <!-- Alert for Logout -->
                    <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show shadow-sm mb-4 rounded-3" role="alert">
                        <span>Bạn đã đăng xuất thành công.</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <!-- Alert for Registration Success -->
                    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show shadow-sm mb-4 rounded-3" role="alert">
                        <span>Đăng ký tài khoản thành công! Vui lòng đăng nhập.</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <form th:action="@{/login}" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
                    </form>

                    <div class="mt-3 text-center">
                        <a href="/register">Chưa có tài khoản? Đăng ký ngay</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
