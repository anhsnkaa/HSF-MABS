spring.application.name=MedicalAppointmentBookingSystem
server.port=9999
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=MABS;encrypt=true;trustServerCertificate=true

spring.datasource.username=sa
spring.datasource.password=sa

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none

spring.thymleaf.prefix=classpath:/templates/
spring.thymleaf.suffix=.html
spring.thymleaf.mode=HTML
spring.thymleaf.cache=false

spring.jpa.open-in-view=false

spring.security.user.name=admin
spring.security.user.password=123
spring.security.user.roles=ADMIN


spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

